<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Checker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>BMI Checker</h1>
      <h2>HELLO {{ username }}!!</h2>
      <p class="subtitle">Check if you are underweight, normal, or overweight</p>

      <form method="POST">
        <label for="weight">Weight (kg)</label>
        <input type="number" step="0.1" name="weight" id="weight" placeholder="Enter your weight" required>

        <label for="height">Height (cm)</label>
        <input type="number" step="0.1" name="height" id="height" placeholder="Enter your height" required>

        <button type="submit">Calculate BMI</button>
      </form>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      {% if bmi %}
        <div class="result">
          <h2>Your BMI: {{ bmi }}</h2>
          <p>Status: <strong>{{ result }}</strong></p>

           <a class="try-again-link" href="{{ url_for('bmi_page', name=username) }}">
                <button type="button" class="secondary-btn">Try Again</button>
            </a>
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
